spring.application.name=RatingService

server.port=8083


spring.data.mongodb.uri=mongodb://localhost:27017/microservices
spring.data.mongodb.auto-index-creation=true

# Eureka Server URL
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Enable registration with Eureka
eureka.client.register-with-eureka=true

# Enable fetching registry (to discover other services)
eureka.client.fetch-registry=true


# spring.data.mongodb.uri=mongodb://localhost:27017/microservices
# In the context of Spring Boot, spring.data is part of the property namespace used to configure Spring Data projects. It is not a class or a library itself it is a convention in Spring Boot application.properties or application.yml files to organize settings for Spring Data modules.

# Spring Data is a family of projects that simplifies database access in Spring applications.
# Examples include:
# Spring Data JPA - for relational databases (like MySQL, PostgreSQL)
# Spring Data MongoDB - for MongoDB
# Spring Data Redis - for Redis

# Spring Data provides:
# Repositories (CrudRepository, MongoRepository, etc.)
# Automatic query derivation from method names

# spring.data.mongodb.uri
# the .uri is the MongoDB connection string-a single string that tells Spring Boot how to connect to your MongoDB database.

# mongodb://localhost:27017/microservices
# What mongodb:// is

# mongodb:// is called a protocol scheme.

# A protocol is basically a language or rules that a client (your app) and a server (MongoDB) use to talk to each other.
# mongodb:// tells your MongoDB client:

# Hey, I am talking to a MongoDB server, so use the MongoDB communication rules.

# It is like saying I am speaking English before starting a conversation. Without it, the client would not know what kind of database it is connecting to.

# Why we use it

# When your Spring Boot app (or any app) wants to connect to a database, it needs to know:

# Where the database is - host and port (localhost:27017)
# Which database to use - e.g., microservices
# How to talk to it - what protocol to use (mongodb://)

# Putting all of this in a single string makes it easy to pass all connection info in one place.

# Why it is at the start of the URL
# URLs always start with a protocol. Examples:
# http://example.com - web page
# ftp://fileserver.com - file transfer
# mongodb://localhost:27017/mydb - MongoDB database
# The client driver reads the protocol first to know how to interpret the rest of the URL.



# spring.data.mongodb.auto-index-creation=true
# Purpose: Tells Spring Data MongoDB to automatically create indexes in your MongoDB database based on the annotations in your entity classes.
# Index helps the database find data faster
# Creating an index = telling MongoDB: Please build a lookup table / map for this field so that whenever I search for a value in this field, you can find it quickly, without scanning the entire collection.

